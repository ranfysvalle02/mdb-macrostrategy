name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-unit:
    name: Lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check

      - name: Unit tests (no databases)
        run: uv run pytest -m "not integration" -q

  integration:
    name: Integration (Postgres + Atlas Local)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Start databases
        run: docker compose up -d

      - name: Wait for both containers to be healthy
        run: |
          for i in $(seq 1 90); do
            pg=$(docker inspect -f '{{.State.Health.Status}}' macrostrategy-postgres 2>/dev/null || echo starting)
            mongo=$(docker inspect -f '{{.State.Health.Status}}' macrostrategy-atlas 2>/dev/null || echo starting)
            echo "attempt $i: postgres=$pg mongodb=$mongo"
            if [ "$pg" = "healthy" ] && [ "$mongo" = "healthy" ]; then
              echo "Both databases healthy"; exit 0
            fi
            sleep 5
          done
          echo "::error::Databases did not become healthy in time"
          docker compose ps
          docker compose logs --tail 80
          exit 1

      - name: Integration tests
        run: uv run pytest -m integration -q

      - name: Tear down
        if: always()
        run: docker compose down -v
